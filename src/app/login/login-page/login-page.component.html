<div class="h-screen flex items-center justify-center bg-[#FAF7F2]">
  <mat-card appearance="outlined" class="w-96 m-auto p-6">
    <mat-card-header class="mb-6">
      <mat-card-title class="text-2xl font-semibold">Sign in</mat-card-title>
      <mat-card-subtitle>Access your restaurant dashboard</mat-card-subtitle>
    </mat-card-header>

    <form (ngSubmit)="loginWithEmail()" class="flex flex-col gap-4">
      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Email</mat-label>
        <input matInput type="email" [ngModel]="email()" (ngModelChange)="email.set($event)" name="email" required />
      </mat-form-field>

      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Password</mat-label>
        <input matInput type="password" [ngModel]="password()" (ngModelChange)="password.set($event)" name="password" required />
      </mat-form-field>

      @if (error()) {
        <div role="alert" class="text-red-500 text-sm">{{ error() }}</div>
      }

      <button matButton="filled" type="submit" [disabled]="loading()" class="w-full">
        @if (loading()) {
          Signing in...
        } @else {
          Sign in
        }
      </button>
    </form>

    <div class="mt-4 flex flex-col gap-2">
      <button matButton="outlined" (click)="loginWithGoogle()" [disabled]="loading()" class="w-full">
        Sign in with Google
      </button>

      <a routerLink="/reset-password" class="text-sm text-center text-gray-500 hover:text-gray-700">
        Forgot password?
      </a>

      <a routerLink="/signup" class="text-sm text-center text-gray-500 hover:text-gray-700">
        Don't have an account? Sign up
      </a>
    </div>
  </mat-card>
</div>
