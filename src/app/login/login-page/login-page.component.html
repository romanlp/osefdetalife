<div class="h-screen flex items-center justify-center">
  <mat-card appearance="outlined" class="w-96 m-auto">

      <mat-card-title> Sign in</mat-card-title>
      <mat-card-subtitle>Use your Google account</mat-card-subtitle>

</div>
