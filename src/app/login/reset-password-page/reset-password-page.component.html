<div class="h-screen flex items-center justify-center bg-[#FAF7F2]">
  <mat-card appearance="outlined" class="w-96 m-auto p-6">
    <mat-card-header class="mb-6">
      <mat-card-title class="text-2xl font-semibold">Reset password</mat-card-title>
      <mat-card-subtitle>Enter your email to receive a reset link</mat-card-subtitle>
    </mat-card-header>

    @if (sent()) {
      <div class="text-center">
        <p class="mb-4 text-gray-600">Check your email for a password reset link.</p>
        <a routerLink="/login" matButton="outlined">Back to sign in</a>
      </div>
    } @else {
      <form (ngSubmit)="sendResetEmail()" class="flex flex-col gap-4">
        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Email</mat-label>
          <input matInput type="email" [ngModel]="email()" (ngModelChange)="email.set($event)" name="email" required />
        </mat-form-field>

        @if (error()) {
          <div role="alert" class="text-red-500 text-sm">{{ error() }}</div>
        }

        <button matButton="filled" type="submit" [disabled]="loading()" class="w-full">
          @if (loading()) {
            Sending...
          } @else {
            Send reset link
          }
        </button>
      </form>

      <div class="mt-4">
        <a routerLink="/login" class="text-sm text-center text-gray-500 hover:text-gray-700 block">
          Back to sign in
        </a>
      </div>
    }
  </mat-card>
</div>
